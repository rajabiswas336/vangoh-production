<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Creative Forge</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Raleway',Arial;background:#f0f0f0}header{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;padding:2.5rem 5%;text-align:center}header h1{font-size:2rem}.container{max-width:1200px;margin:2rem auto;padding:0 5%}.creations{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem}.creation{background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.creation-img{width:100%;height:180px;background:linear-gradient(135deg,#ef4444,#dc2626);display:flex;align-items:center;justify-content:center;color:white;font-size:2.5rem}.creation-info{padding:1rem}.creation-name{color:#ef4444;font-weight:bold;margin-bottom:0.3rem}.category{font-size:0.85rem;color:#666}footer{background:#dc2626;color:white;text-align:center;padding:2rem}.cta{background:#ef4444;color:white;padding:0.8rem 1.5rem;border:none;border-radius:5px;cursor:pointer}</style></head><body><header><h1>Creative Forge</h1><p>Creative Solutions</p></header><div class="container"><h2 style="margin:2rem 0">Projects</h2><div class="creations"><div class="creation"><div class="creation-img">🎬</div><div class="creation-info"><div class="creation-name">Video</div><div class="category">Multimedia</div></div></div><div class="creation"><div class="creation-img">🎵</div><div class="creation-info"><div class="creation-name">Audio</div><div class="category">Production</div></div></div><div class="creation"><div class="creation-img">📸</div><div class="creation-info"><div class="creation-name">Photo</div><div class="category">Editing</div></div></div></div><div style="text-align:center;margin:2rem 0"><button class="cta">Explore</button></div></div><footer><p>&copy; 2024 Creative Forge</p></footer></body></html>
